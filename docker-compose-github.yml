services:
  comfyui:
    image: ghcr.io/urbanstepa/comfyui-su:latest
    container_name: comfyui-3d
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Adjust left side to your models path
      - "D:/ComfyUI_installed_2/models:/models"
      # Persist compiled CUDA extensions across restarts
      - comfyui_extensions:/opt
      # Persist outputs and user data
      - comfyui_output:/opt/ComfyUI/output
      - comfyui_input:/opt/ComfyUI/input
      - comfyui_user:/opt/ComfyUI/user

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - COMFYUI_ARGS=--listen 0.0.0.0 --port 8188 --highvram

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  comfyui_extensions:
  comfyui_output:
  comfyui_input:
  comfyui_user:
