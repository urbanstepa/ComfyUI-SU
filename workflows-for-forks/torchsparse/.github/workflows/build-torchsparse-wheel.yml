# ---------------------------------------------------------
# Build torchsparse 2.1.0 wheel with CUDA 13.0 / PyTorch 2.10
# ---------------------------------------------------------
# Triggers:
#   - push to main          (CI smoke-build)
#   - tags matching v*       (release build)
#   - workflow_dispatch      (manual / testing)
#
# The wheel is uploaded as an Actions artifact on every run.
# On tag pushes (v*) a GitHub Release is created automatically
# with the wheel attached.
# ---------------------------------------------------------

name: Build torchsparse wheel

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Cancel redundant runs on the same branch (but never cancel tag builds).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build wheel (CUDA 13.0 / Python 3.12)
    runs-on: ubuntu-latest

    # ------------------------------------
    # Build inside the NVIDIA CUDA image
    # ------------------------------------
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04

    env:
      # Target common GPU architectures (Turing through Blackwell).
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
      FORCE_CUDA: "1"
      # Limit parallel compilation jobs to avoid OOM on GHA runners.
      MAX_JOBS: "2"
      DEBIAN_FRONTEND: noninteractive

    steps:
      # ---------------------------------------------------
      # 1. Check out the repository
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Install Python 3.12 from deadsnakes PPA
      # ---------------------------------------------------
      - name: Install Python 3.12
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv python3.12-distutils
          # Make python3.12 the default python/python3
          update-alternatives --install /usr/bin/python  python  /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          # Bootstrap pip
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools

      # ---------------------------------------------------
      # 3. Install system-level build dependencies
      # ---------------------------------------------------
      - name: Install system dependencies
        run: |
          apt-get install -y --no-install-recommends \
            libsparsehash-dev \
            build-essential \
            ninja-build \
            git

      # ---------------------------------------------------
      # 4. Install PyTorch 2.10.0+cu130 (+ torchvision, torchaudio)
      # ---------------------------------------------------
      - name: Install PyTorch
        run: |
          python -m pip install --no-cache-dir \
            torch==2.10.0+cu130 \
            torchvision==0.25.0+cu130 \
            torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      # ---------------------------------------------------
      # 5. Install Python build dependencies
      # ---------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --no-cache-dir \
            rootpath \
            "backports.cached-property" \
            numpy \
            tqdm \
            typing-extensions \
            wheel

      # ---------------------------------------------------
      # 6. Build the torchsparse wheel
      # ---------------------------------------------------
      # torchsparse.backend is a CUDAExtension that compiles
      # *.cu and *.cpp sources from torchsparse/backend/ and
      # links against sparsehash headers in include/.
      # --no-deps ensures we only package torchsparse itself.
      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist/
          echo "--- Built wheels ---"
          ls -lh dist/

      # ---------------------------------------------------
      # 7. Upload wheel as Actions artifact
      # ---------------------------------------------------
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: torchsparse-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 90

  # =========================================================
  # Release job — runs only on tag pushes matching v*
  # =========================================================
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create releases

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: torchsparse-wheel
          path: dist/

      - name: Create release and upload wheel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: torchsparse ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.whl
