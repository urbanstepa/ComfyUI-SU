# ──────────────────────────────────────────────────────────────────────────────
# Build pre-compiled custom_rasterizer wheel (CUDA cross-compile, no GPU needed)
#
# This workflow builds the custom_rasterizer_kernel CUDA extension from
# hy3dgen/texgen/custom_rasterizer as a Python wheel, so downstream consumers
# (e.g. the ComfyUI Docker image) can pip-install it instead of compiling
# from source every time.
#
# The wheel targets CUDA 13.0 and covers SM 7.5 through 9.0 (Turing, Ampere,
# Ada Lovelace, Hopper).
#
# Artifacts:
#   - Every run uploads the wheel as a GitHub Actions artifact.
#   - Tag pushes (v*) additionally create a GitHub Release with the wheel
#     attached, so the Dockerfile can curl it directly.
# ──────────────────────────────────────────────────────────────────────────────
name: Build custom_rasterizer wheel

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# ── Global environment for the CUDA build ────────────────────────────────────
env:
  # Target GPU architectures (SM values)
  TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
  # Tell setup.py / CUDAExtension to compile CUDA kernels even without a GPU
  FORCE_CUDA: "1"
  # Limit parallel nvcc jobs to avoid OOM on GitHub Actions runners (14 GB RAM)
  MAX_JOBS: "2"

jobs:
  build-wheel:
    runs-on: ubuntu-latest

    # Run everything inside the NVIDIA CUDA 13.0 dev container so nvcc and
    # CUDA headers are available without any manual setup.
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04

    permissions:
      contents: write          # needed for creating releases on tag pushes

    steps:
      # ── 1. Checkout the repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Python 3.12 from deadsnakes PPA ────────────────────────
      # The CUDA dev image ships with no Python, so we add it ourselves.
      - name: Install Python 3.12
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv python3.12-distutils
          # Make python3 / python point to 3.12
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python  python  /usr/bin/python3.12 1
          # Bootstrap pip
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install --upgrade pip setuptools wheel

      # ── 3. Install PyTorch (cu130) ─────────────────────────────────────────
      # Must match the CUDA toolkit in the container so torch.utils.cpp_extension
      # can locate the correct libraries.
      - name: Install PyTorch 2.10.0+cu130
        run: |
          pip install \
            torch==2.10.0+cu130 \
            torchvision==0.25.0+cu130 \
            torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      # ── 4. Verify CUDA toolchain ──────────────────────────────────────────
      - name: Verify CUDA / PyTorch setup
        run: |
          echo "── nvcc ──"
          nvcc --version
          echo "── Python ──"
          python --version
          echo "── PyTorch ──"
          python -c "import torch; print(f'torch {torch.__version__}  CUDA {torch.version.cuda}')"
          echo "── TORCH_CUDA_ARCH_LIST ──"
          echo "$TORCH_CUDA_ARCH_LIST"

      # ── 5. Build the wheel ─────────────────────────────────────────────────
      # CUDAExtension setups sometimes don't work cleanly with `pip wheel`,
      # so we fall back to `python setup.py bdist_wheel` if needed.
      - name: Build custom_rasterizer wheel
        working-directory: hy3dgen/texgen/custom_rasterizer
        run: |
          # Ensure build deps are available
          pip install setuptools wheel ninja

          echo "::group::Attempting pip wheel"
          if pip wheel . --no-deps --wheel-dir dist/ 2>&1; then
            echo "pip wheel succeeded"
          else
            echo "pip wheel failed — falling back to setup.py bdist_wheel"
            python setup.py bdist_wheel --dist-dir dist/
          fi
          echo "::endgroup::"

          echo "── Built wheel(s) ──"
          ls -lh dist/*.whl

      # ── 6. Upload wheel as Actions artifact ────────────────────────────────
      # Available on every run for download from the Actions UI.
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-rasterizer-wheel
          path: hy3dgen/texgen/custom_rasterizer/dist/*.whl
          if-no-files-found: error
          retention-days: 90

      # ── 7. Create GitHub Release on tag push ───────────────────────────────
      # Only runs when the trigger is a version tag (e.g. v1.0.0).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: hy3dgen/texgen/custom_rasterizer/dist/*.whl
          generate_release_notes: true
