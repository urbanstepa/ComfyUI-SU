services:
  comfyui:
    image: ghcr.io/urbanstepa/comfyui-su:latest
    container_name: comfyui-3d
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Primary models directory (D: drive)
      - "D:/ComfyUI_installed_2/models:/models"
      # External models (E: drive) — mounted as subfolders
      - "E:/Models/CogVideo:/models/CogVideo/external"
      - "E:/Models/Joy_caption:/models/Joy_caption/external"
      - "E:/Models/LLM:/models/LLM/external"
      - "E:/Models/animatediff_models:/models/animatediff_models/external"
      - "E:/Models/animatediff_motion_lora:/models/animatediff_motion_lora/external"
      - "E:/Models/audio_encoders:/models/audio_encoders/external"
      - "E:/Models/blip:/models/blip/external"
      - "E:/Models/checkpoints:/models/checkpoints/external"
      - "E:/Models/clip:/models/clip/external"
      - "E:/Models/clip_vision:/models/clip_vision/external"
      - "E:/Models/controlnet:/models/controlnet/external"
      - "E:/Models/diffusers:/models/diffusers/external"
      - "E:/Models/diffusion_models:/models/diffusion_models/external"
      - "E:/Models/embeddings:/models/embeddings/external"
      - "E:/Models/gligen:/models/gligen/external"
      - "E:/Models/hypernetworks:/models/hypernetworks/external"
      - "E:/Models/insightface:/models/insightface/external"
      - "E:/Models/latent_upscale_models:/models/latent_upscale_models/external"
      - "E:/Models/loras:/models/loras/external"
      - "E:/Models/model_patches:/models/model_patches/external"
      - "E:/Models/photomaker:/models/photomaker/external"
      - "E:/Models/style_models:/models/style_models/external"
      - "E:/Models/text_encoders:/models/text_encoders/external"
      - "E:/Models/ultralytics:/models/ultralytics/external"
      - "E:/Models/unet:/models/unet/external"
      - "E:/Models/upscale_models:/models/upscale_models/external"
      - "E:/Models/vae:/models/vae/external"
      - "E:/Models/xlabs:/models/xlabs/external"
      - "E:/Models/yolo:/models/yolo/external"
      # Outputs and user data (host paths for easy access)
      - "D:/ComfyUI_installed_2/output:/opt/ComfyUI/output"
      - "D:/ComfyUI_installed_2/input:/opt/ComfyUI/input"
      - "D:/ComfyUI_installed_2/user:/opt/ComfyUI/user"

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_PRELOAD=/usr/local/cuda/lib64/libcublas.so.13.0.0.19:/usr/local/cuda/lib64/libcublasLt.so.13.0.0.19
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - COMFYUI_ARGS=--listen 0.0.0.0 --port 8188 --lowvram --disable-cuda-malloc --disable-pinned-memory

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
