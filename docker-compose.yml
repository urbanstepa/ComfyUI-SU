services:
  comfyui:
    image: ghcr.io/urbanstepa/comfyui-su:latest
    container_name: comfyui-3d
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Models (E: drive) — each folder mounted directly
      - "E:/Models/CogVideo:/models/CogVideo"
      - "E:/Models/Joy_caption:/models/Joy_caption"
      - "E:/Models/LLM:/models/LLM"
      - "E:/Models/animatediff_models:/models/animatediff_models"
      - "E:/Models/animatediff_motion_lora:/models/animatediff_motion_lora"
      - "E:/Models/audio_encoders:/models/audio_encoders"
      - "E:/Models/blip:/models/blip"
      - "E:/Models/checkpoints:/models/checkpoints"
      - "E:/Models/clip:/models/clip"
      - "E:/Models/clip_vision:/models/clip_vision"
      - "E:/Models/controlnet:/models/controlnet"
      - "E:/Models/diffusers:/models/diffusers"
      - "E:/Models/diffusion_models:/models/diffusion_models"
      - "E:/Models/embeddings:/models/embeddings"
      - "E:/Models/gligen:/models/gligen"
      - "E:/Models/hypernetworks:/models/hypernetworks"
      - "E:/Models/insightface:/models/insightface"
      - "E:/Models/latent_upscale_models:/models/latent_upscale_models"
      - "E:/Models/loras:/models/loras"
      - "E:/Models/model_patches:/models/model_patches"
      - "E:/Models/photomaker:/models/photomaker"
      - "E:/Models/style_models:/models/style_models"
      - "E:/Models/text_encoders:/models/text_encoders"
      - "E:/Models/ultralytics:/models/ultralytics"
      - "E:/Models/unet:/models/unet"
      - "E:/Models/upscale_models:/models/upscale_models"
      - "E:/Models/vae:/models/vae"
      - "E:/Models/vae_approx:/models/vae_approx"
      - "E:/Models/xlabs:/models/xlabs"
      - "E:/Models/yolo:/models/yolo"
      # Outputs and user data (host paths for easy access)
      - "E:/ComfyUI/output:/opt/ComfyUI/output"
      - "E:/ComfyUI/input:/opt/ComfyUI/input"
      - "E:/ComfyUI/user:/opt/ComfyUI/user"

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_PRELOAD=/usr/local/cuda/lib64/libcublas.so.13.0.0.19:/usr/local/cuda/lib64/libcublasLt.so.13.0.0.19
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - COMFYUI_ARGS=--listen 0.0.0.0 --port 8188 --lowvram --disable-cuda-malloc --disable-pinned-memory

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
