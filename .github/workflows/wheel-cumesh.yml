# Build cumesh CUDA wheel
# Trigger manually from Actions tab, or called by build-wheels.yml
name: "Wheel: cumesh"

on:
  workflow_dispatch:
  workflow_call:

env:
  DEBIAN_FRONTEND: noninteractive
  TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
  FORCE_CUDA: "1"
  MAX_JOBS: "2"
  RELEASE_TAG: cuda-wheels

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04
    permissions:
      contents: write

    steps:
      - name: Install Python 3.12 + pip
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent git
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.12 1
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel ninja

      - name: Install PyTorch 2.10.0+cu130
        run: |
          pip install torch==2.10.0+cu130 torchvision==0.25.0+cu130 torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      - name: Install Eigen3
        # Provides /usr/include/eigen3/Eigen/{Dense,Core,...} — used as
        # fallback because the cubvh nested submodule (third_party/eigen)
        # is consistently empty even with --recurse-submodules.
        run: apt-get install -y --no-install-recommends libeigen3-dev

      - name: Clone source (with submodules)
        run: git clone --recurse-submodules https://github.com/visualbruno/CuMesh.git /build/repo

      - name: Build wheel
        working-directory: /build/repo
        env:
          # Point compiler to system Eigen so <Eigen/Dense> resolves for all
          # translation units, including api_gpu which setup.py omits -I for.
          CPLUS_INCLUDE_PATH: /usr/include/eigen3
        run: |
          pip wheel . --no-deps --no-build-isolation --wheel-dir /build/dist/ \
            || python setup.py bdist_wheel --dist-dir /build/dist/
          ls -lh /build/dist/*.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cumesh-wheel
          path: /build/dist/*.whl
          if-no-files-found: error
          retention-days: 90

      # Upload to the persistent cuda-wheels release (creates it if missing)
      - name: Install gh CLI
        run: |
          apt-get install -y --no-install-recommends curl
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update -qq && apt-get install -y gh

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /build/dist
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"
          WHEEL=$(ls *.whl | head -1)

          # Create release if it doesn't exist
          gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1 || \
            gh release create "$TAG" --repo "$REPO" \
              --title "CUDA Wheels" \
              --notes "Pre-built CUDA extension wheels (cu130 / Python 3.12 / PyTorch 2.10)" \
              --prerelease

          # Delete old version of this wheel if it exists, then upload new one
          EXISTING=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -i 'cumesh' || true)
          for OLD in $EXISTING; do
            echo "Replacing $OLD"
            gh release delete-asset "$TAG" "$OLD" --repo "$REPO" --yes
          done

          gh release upload "$TAG" "$WHEEL" --repo "$REPO" --clobber
          echo "✅ Uploaded $WHEEL to release $TAG"
