name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch/PR tags
            type=ref,event=branch
            type=ref,event=pr
            # Semver tags (when you push a git tag like v1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Auto-generated date tag on every main push (e.g. 20260321-1430)
            type=raw,value={{date 'YYYYMMDD-HHmm'}},enable={{is_default_branch}}
            # Short commit SHA (e.g. abc1234)
            type=sha,prefix=,enable={{is_default_branch}}
            # Latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TORCH_CUDA_ARCH_LIST=7.5;8.0;8.6;8.9;9.0
            CUSTOM_RASTERIZER_WHEEL_URL=${{ vars.CUSTOM_RASTERIZER_WHEEL_URL }}
            VOXELIZE_WHEEL_URL=${{ vars.VOXELIZE_WHEEL_URL }}
            TORCHSPARSE_WHEEL_URL=${{ vars.TORCHSPARSE_WHEEL_URL }}
            FLASH_ATTN_WHEEL_URL=${{ vars.FLASH_ATTN_WHEEL_URL || 'https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.0/flash_attn-2.8.3%2Bcu130torch2.10-cp312-cp312-linux_x86_64.whl' }}
