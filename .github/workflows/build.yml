# ──────────────────────────────────────────────────────────────────────────────
# Build and push the final ComfyUI-SU Docker image
#
# Built on top of the base image (CUDA + Python + PyTorch).
# Installs ComfyUI, custom nodes, CUDA wheels, and config.
#
# Base image: ghcr.io/urbanstepa/comfyui-su-base:latest
#   (built separately via "Build Base Image" workflow)
# ──────────────────────────────────────────────────────────────────────────────
name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Resolve wheel URLs from cuda-wheels release ────────────────
      - name: Resolve CUDA wheel URLs
        id: wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUSTOM_RASTERIZER_WHEEL_URL: ${{ vars.CUSTOM_RASTERIZER_WHEEL_URL }}
          VOXELIZE_WHEEL_URL: ${{ vars.VOXELIZE_WHEEL_URL }}
          TORCHSPARSE_WHEEL_URL: ${{ vars.TORCHSPARSE_WHEEL_URL }}
          CUMESH_WHEEL_URL: ${{ vars.CUMESH_WHEEL_URL }}
        run: |
          REPO="${{ github.repository }}"
          TAG="cuda-wheels"

          if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
            echo "Found $TAG release"
            ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets \
              -q '.assets[] | .name + " " + .url')

            CUSTOM_RASTERIZER_AUTO=$(echo "$ASSETS" | grep -i 'custom_rasterizer' | awk '{print $2}' || true)
            VOXELIZE_AUTO=$(echo "$ASSETS" | grep -iE 'udf_ext|voxelize' | awk '{print $2}' || true)
            TORCHSPARSE_AUTO=$(echo "$ASSETS" | grep -i 'torchsparse' | awk '{print $2}' || true)
            CUMESH_AUTO=$(echo "$ASSETS" | grep -i 'cumesh' | awk '{print $2}' || true)
          else
            echo "No $TAG release found"
            CUSTOM_RASTERIZER_AUTO=""
            VOXELIZE_AUTO=""
            TORCHSPARSE_AUTO=""
            CUMESH_AUTO=""
          fi

          echo "custom_rasterizer=${CUSTOM_RASTERIZER_WHEEL_URL:-$CUSTOM_RASTERIZER_AUTO}" >> "$GITHUB_OUTPUT"
          echo "voxelize=${VOXELIZE_WHEEL_URL:-$VOXELIZE_AUTO}" >> "$GITHUB_OUTPUT"
          echo "torchsparse=${TORCHSPARSE_WHEEL_URL:-$TORCHSPARSE_AUTO}" >> "$GITHUB_OUTPUT"
          echo "cumesh=${CUMESH_WHEEL_URL:-$CUMESH_AUTO}" >> "$GITHUB_OUTPUT"

          echo "── Resolved URLs ──"
          echo "custom_rasterizer: ${CUSTOM_RASTERIZER_WHEEL_URL:-${CUSTOM_RASTERIZER_AUTO:-<not built>}}"
          echo "voxelize: ${VOXELIZE_WHEEL_URL:-${VOXELIZE_AUTO:-<not built>}}"
          echo "torchsparse: ${TORCHSPARSE_WHEEL_URL:-${TORCHSPARSE_AUTO:-<not built>}}"
          echo "cumesh: ${CUMESH_WHEEL_URL:-${CUMESH_AUTO:-<not built>}}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value={{date 'YYYYMMDD-HHmm'}},enable={{is_default_branch}}
            type=sha,prefix=,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ vars.BASE_IMAGE || 'ghcr.io/urbanstepa/comfyui-su-base:latest' }}
            TORCH_CUDA_ARCH_LIST=7.5;8.0;8.6;8.9;9.0
            CUSTOM_RASTERIZER_WHEEL_URL=${{ steps.wheels.outputs.custom_rasterizer }}
            VOXELIZE_WHEEL_URL=${{ steps.wheels.outputs.voxelize }}
            TORCHSPARSE_WHEEL_URL=${{ steps.wheels.outputs.torchsparse }}
            CUMESH_WHEEL_URL=${{ steps.wheels.outputs.cumesh }}
            FLASH_ATTN_WHEEL_URL=${{ vars.FLASH_ATTN_WHEEL_URL || 'https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.0/flash_attn-2.8.3%2Bcu130torch2.10-cp312-cp312-linux_x86_64.whl' }}
