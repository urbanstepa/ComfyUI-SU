# ──────────────────────────────────────────────────────────────────────────────
# Build and push the final ComfyUI-SU Docker image
#
# This is fast (~2 min) because it builds on top of the base image which
# has all dependencies pre-installed. It only clones repos and copies config.
#
# Base image: ghcr.io/urbanstepa/comfyui-su-base:latest
#   (built separately via "Build Base Image" workflow)
# ──────────────────────────────────────────────────────────────────────────────
name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch/PR tags
            type=ref,event=branch
            type=ref,event=pr
            # Semver tags (when you push a git tag like v1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Auto-generated date tag on every main push (e.g. 20260321-1430)
            type=raw,value={{date 'YYYYMMDD-HHmm'}},enable={{is_default_branch}}
            # Short commit SHA (e.g. abc1234)
            type=sha,prefix=,enable={{is_default_branch}}
            # Latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ vars.BASE_IMAGE || 'ghcr.io/urbanstepa/comfyui-su-base:latest' }}
