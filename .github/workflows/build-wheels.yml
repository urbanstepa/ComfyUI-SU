# ──────────────────────────────────────────────────────────────────────────────
# Build ALL CUDA wheels and create a GitHub Release
#
# Calls each individual wheel workflow in parallel, then collects
# all artifacts into a single release.
#
# To build just one wheel, run its workflow directly from the Actions tab:
#   - "Wheel: custom_rasterizer"
#   - "Wheel: voxelize"
#   - "Wheel: torchsparse"
#
# To add a new wheel: create a new wheel-<name>.yml (copy any existing one),
# then add it to the jobs/release.needs list below.
# ──────────────────────────────────────────────────────────────────────────────
name: "Build All Wheels + Release"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. wheels-20260322). Leave empty for auto.'
        required: false
        default: ''

jobs:
  # ── Call each wheel workflow in parallel ──────────────────────────────────
  custom-rasterizer:
    uses: ./.github/workflows/wheel-custom-rasterizer.yml

  voxelize:
    uses: ./.github/workflows/wheel-voxelize.yml

  torchsparse:
    uses: ./.github/workflows/wheel-torchsparse.yml

  # ── Collect all wheels into a GitHub Release ─────────────────────────────
  release:
    name: "Create wheel release"
    needs: [custom-rasterizer, voxelize, torchsparse]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=wheels-$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CUDA Wheels — ${{ steps.tag.outputs.tag }}"
          body: |
            Pre-built CUDA extension wheels for ComfyUI-SU Docker image.

            **Build environment:**
            - CUDA 13.0 (`nvidia/cuda:13.0.0-devel-ubuntu22.04`)
            - Python 3.12
            - PyTorch 2.10.0+cu130
            - TORCH_CUDA_ARCH_LIST: `7.5;8.0;8.6;8.9;9.0`

            **Usage:** Set wheel URLs as repository variables, or pass as `--build-arg` to `docker build`.
          files: wheels/*.whl
          make_latest: false
