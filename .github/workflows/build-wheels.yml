# ──────────────────────────────────────────────────────────────────────────────
# Build ALL CUDA wheels (convenience wrapper)
#
# Calls each individual wheel workflow in parallel. Each one builds its
# wheel and uploads it to the persistent "cuda-wheels" GitHub Release.
#
# To build just one wheel, run its workflow directly:
#   - "Wheel: custom_rasterizer"
#   - "Wheel: voxelize"
#   - "Wheel: torchsparse"
#
# To add a new wheel: create wheel-<name>.yml (copy any existing one),
# then add it below.
# ──────────────────────────────────────────────────────────────────────────────
name: "Build All Wheels"

on:
  workflow_dispatch:

jobs:
  custom-rasterizer:
    uses: ./.github/workflows/wheel-custom-rasterizer.yml
    permissions:
      contents: write

  voxelize:
    uses: ./.github/workflows/wheel-voxelize.yml
    permissions:
      contents: write

  torchsparse:
    uses: ./.github/workflows/wheel-torchsparse.yml
    permissions:
      contents: write

  cumesh:
    uses: ./.github/workflows/wheel-cumesh.yml
    permissions:
      contents: write
