# ──────────────────────────────────────────────────────────────────────────────
# Build pre-compiled CUDA extension wheels
#
# Builds all three CUDA extensions as Python wheels inside an NVIDIA container:
#   1. custom_rasterizer  (from ComfyUI-Hunyuan3DWrapper)
#   2. voxelize / udf_ext (from ComfyUI-Direct3D-S2)
#   3. torchsparse        (from urbanstepa/torchsparse)
#
# These wheels are then used by the main Dockerfile via WHEEL_URL build args,
# avoiding slow CUDA compilation during every Docker image build.
#
# Trigger: manual only (workflow_dispatch) — wheels only need rebuilding when
# the upstream extension code changes, not on every push.
#
# On completion, wheels are uploaded as GitHub Release assets (tagged as
# "wheels-YYYYMMDD" or a custom tag you provide).
# ──────────────────────────────────────────────────────────────────────────────
name: Build CUDA Wheels

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for the wheels (e.g. wheels-20260322)'
        required: false
        default: ''

env:
  TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
  FORCE_CUDA: "1"
  MAX_JOBS: "2"

jobs:
  # ================================================================
  # Shared setup is repeated per job because GHA containers can't be
  # shared across jobs. Each job builds one wheel independently.
  # ================================================================

  custom-rasterizer:
    name: "Build custom_rasterizer wheel"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04

    steps:
      - name: Install Python 3.12 + pip
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent git
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.12 1
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel ninja

      - name: Install PyTorch 2.10.0+cu130
        run: |
          pip install torch==2.10.0+cu130 torchvision==0.25.0+cu130 torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      - name: Clone ComfyUI-Hunyuan3DWrapper
        run: |
          git clone --depth 1 https://github.com/urbanstepa/ComfyUI-Hunyuan3DWrapper.git /build/repo

      - name: Build wheel
        working-directory: /build/repo/hy3dgen/texgen/custom_rasterizer
        run: |
          if pip wheel . --no-deps --wheel-dir /build/dist/ 2>&1; then
            echo "pip wheel succeeded"
          else
            echo "Falling back to setup.py bdist_wheel"
            python setup.py bdist_wheel --dist-dir /build/dist/
          fi
          echo "── Built wheel ──"
          ls -lh /build/dist/*.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-rasterizer-wheel
          path: /build/dist/*.whl
          if-no-files-found: error
          retention-days: 90

  voxelize:
    name: "Build voxelize wheel"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04

    steps:
      - name: Install Python 3.12 + pip
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent git
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.12 1
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel ninja

      - name: Install PyTorch 2.10.0+cu130
        run: |
          pip install torch==2.10.0+cu130 torchvision==0.25.0+cu130 torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      - name: Clone ComfyUI-Direct3D-S2
        run: |
          git clone --depth 1 https://github.com/urbanstepa/ComfyUI-Direct3D-S2.git /build/repo

      - name: Build wheel
        working-directory: /build/repo/voxelize
        run: |
          if pip wheel . --no-deps --wheel-dir /build/dist/ 2>&1; then
            echo "pip wheel succeeded"
          else
            echo "Falling back to setup.py bdist_wheel"
            python setup.py bdist_wheel --dist-dir /build/dist/
          fi
          echo "── Built wheel ──"
          ls -lh /build/dist/*.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxelize-wheel
          path: /build/dist/*.whl
          if-no-files-found: error
          retention-days: 90

  torchsparse:
    name: "Build torchsparse wheel"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu22.04

    steps:
      - name: Install Python 3.12 + system deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            software-properties-common gpg-agent git \
            libsparsehash-dev build-essential ninja-build
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3.12 python3.12-dev python3.12-venv
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.12 1
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel ninja

      - name: Install PyTorch 2.10.0+cu130
        run: |
          pip install torch==2.10.0+cu130 torchvision==0.25.0+cu130 torchaudio==2.10.0+cu130 \
            --index-url https://download.pytorch.org/whl/cu130

      - name: Install Python build deps
        run: |
          pip install rootpath "backports.cached-property" numpy tqdm typing-extensions

      - name: Clone torchsparse
        run: |
          git clone --depth 1 https://github.com/urbanstepa/torchsparse.git /build/repo

      - name: Build wheel
        working-directory: /build/repo
        run: |
          if pip wheel . --no-deps --wheel-dir /build/dist/ 2>&1; then
            echo "pip wheel succeeded"
          else
            echo "Falling back to setup.py bdist_wheel"
            python setup.py bdist_wheel --dist-dir /build/dist/
          fi
          echo "── Built wheel ──"
          ls -lh /build/dist/*.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torchsparse-wheel
          path: /build/dist/*.whl
          if-no-files-found: error
          retention-days: 90

  # ================================================================
  # Release — collects all wheels and creates a GitHub Release
  # ================================================================
  release:
    name: "Create wheel release"
    needs: [custom-rasterizer, voxelize, torchsparse]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=wheels-$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CUDA Wheels — ${{ steps.tag.outputs.tag }}"
          body: |
            Pre-built CUDA extension wheels for ComfyUI-SU Docker image.

            **Build environment:**
            - CUDA 13.0 (`nvidia/cuda:13.0.0-devel-ubuntu22.04`)
            - Python 3.12
            - PyTorch 2.10.0+cu130
            - TORCH_CUDA_ARCH_LIST: `7.5;8.0;8.6;8.9;9.0`

            **Usage in Dockerfile:**
            ```
            docker build \
              --build-arg CUSTOM_RASTERIZER_WHEEL_URL=<url> \
              --build-arg VOXELIZE_WHEEL_URL=<url> \
              --build-arg TORCHSPARSE_WHEEL_URL=<url> \
              .
            ```

            Or set as repository variables for CI:
            `Settings → Secrets and Variables → Actions → Variables`
          files: wheels/*.whl
          make_latest: false
